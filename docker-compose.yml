services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3501:3501"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend:/app
      - ${VAULT_HOST_PATH:-./vault}:/app/vault
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 3501 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3500:3500"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
